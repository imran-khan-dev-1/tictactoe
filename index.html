<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tic Tac Toe</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body {
    min-height: 100dvh;
    background: #111;
    color: #f0f0f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
  }

  header {
    width: 100%;
    max-width: 420px;
    text-align: center;
    padding: 24px 0 16px;
  }
  header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
  header p { font-size: 13px; color: #888; margin-top: 4px; }

  .mode-bar {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 420px;
    margin-bottom: 20px;
  }
  .mode-btn {
    flex: 1;
    padding: 12px;
    border-radius: 14px;
    border: 1.5px solid #333;
    background: #1a1a1a;
    color: #888;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .mode-btn.active {
    border-color: #e5531a;
    background: #2a1510;
    color: #e5531a;
  }

  .scores {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    width: 100%;
    max-width: 420px;
    margin-bottom: 20px;
  }
  .score-card {
    background: #1a1a1a;
    border-radius: 14px;
    padding: 12px 8px;
    text-align: center;
  }
  .score-label { font-size: 11px; color: #666; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .score-num { font-size: 28px; font-weight: 700; }
  .score-num.x { color: #e5531a; }
  .score-num.o { color: #1d9e75; }
  .score-num.d { color: #888; }

  .status {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
    min-height: 22px;
    color: #ccc;
    text-align: center;
  }

  .board-wrap {
    position: relative;
    width: 100%;
    max-width: 420px;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
  }
  .cell {
    aspect-ratio: 1;
    background: #1a1a1a;
    border-radius: 18px;
    border: 1.5px solid #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(40px, 16vw, 80px);
    font-weight: 800;
    cursor: pointer;
    transition: background .12s, transform .12s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .cell:active:not(.taken) { transform: scale(.93); }
  .cell.x { color: #e5531a; }
  .cell.o { color: #1d9e75; }
  .cell.win { background: #2a1e0e; border-color: #e5531a44; }
  .cell.win.o { background: #0e2a1e; border-color: #1d9e7544; }
  .cell.taken { cursor: default; }
  .cell.pop { animation: pop .18s ease-out; }
  @keyframes pop { 0%{transform:scale(.6)} 60%{transform:scale(1.12)} 100%{transform:scale(1)} }

  .actions {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 420px;
    margin-top: 16px;
  }
  .action-btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: 1.5px solid #333;
    background: #1a1a1a;
    color: #ccc;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background .12s;
  }
  .action-btn:active { background: #2a2a2a; }

  .overlay {
    display: none;
    position: absolute;
    inset: -10px;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,.75);
    border-radius: 22px;
    z-index: 10;
    backdrop-filter: blur(4px);
  }
  .overlay.show { display: flex; }
  .result-box {
    background: #1e1e1e;
    border-radius: 20px;
    padding: 28px 24px;
    text-align: center;
    border: 1.5px solid #333;
    width: calc(100% - 40px);
  }
  .result-emoji { font-size: 52px; margin-bottom: 10px; }
  .result-title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .result-sub { font-size: 14px; color: #888; margin-bottom: 20px; }
  .result-btns { display: flex; gap: 8px; }
  .result-btns button {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: 1.5px solid #333;
    background: #2a2a2a;
    color: #ccc;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .result-btns button.primary {
    background: #e5531a;
    border-color: #e5531a;
    color: #fff;
  }
</style>
</head>
<body>

<header>
  <h1>Tic Tac Toe</h1>
  <p id="header-sub">vs Computer</p>
</header>

<div class="mode-bar">
  <button class="mode-btn active" id="btn-cpu" onclick="setMode('cpu')">Vs Computer</button>
  <button class="mode-btn" id="btn-friend" onclick="setMode('friend')">Vs Friend</button>
</div>

<div class="scores">
  <div class="score-card">
    <div class="score-label" id="p1-label">You</div>
    <div class="score-num x" id="score-x">0</div>
  </div>
  <div class="score-card">
    <div class="score-label">Draws</div>
    <div class="score-num d" id="score-d">0</div>
  </div>
  <div class="score-card">
    <div class="score-label" id="p2-label">Computer</div>
    <div class="score-num o" id="score-o">0</div>
  </div>
</div>

<div class="status" id="status">Your turn (X)</div>

<div class="board-wrap">
  <div class="board" id="board">
    <div class="cell" data-i="0" onclick="click_(0)"></div>
    <div class="cell" data-i="1" onclick="click_(1)"></div>
    <div class="cell" data-i="2" onclick="click_(2)"></div>
    <div class="cell" data-i="3" onclick="click_(3)"></div>
    <div class="cell" data-i="4" onclick="click_(4)"></div>
    <div class="cell" data-i="5" onclick="click_(5)"></div>
    <div class="cell" data-i="6" onclick="click_(6)"></div>
    <div class="cell" data-i="7" onclick="click_(7)"></div>
    <div class="cell" data-i="8" onclick="click_(8)"></div>
  </div>
  <div class="overlay" id="overlay">
    <div class="result-box">
      <div class="result-emoji" id="r-emoji">🎉</div>
      <div class="result-title" id="r-title">You win!</div>
      <div class="result-sub" id="r-sub">Well played</div>
      <div class="result-btns">
        <button onclick="resetAll()">Reset</button>
        <button class="primary" onclick="newGame()">Play again</button>
      </div>
    </div>
  </div>
</div>

<div class="actions">
  <button class="action-btn" onclick="newGame()">New game</button>
  <button class="action-btn" onclick="resetAll()">Reset scores</button>
</div>

<script>
const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let board, cur, mode = 'cpu', locked, scores = {X:0,O:0,D:0};

function init() {
  board = Array(9).fill(null);
  cur = 'X'; locked = false;
  renderBoard();
  setStatus();
  document.getElementById('overlay').classList.remove('show');
}

function setMode(m) {
  mode = m;
  document.getElementById('btn-cpu').classList.toggle('active', m==='cpu');
  document.getElementById('btn-friend').classList.toggle('active', m==='friend');
  document.getElementById('p1-label').textContent = m==='cpu' ? 'You' : 'Player 1';
  document.getElementById('p2-label').textContent = m==='cpu' ? 'Computer' : 'Player 2';
  document.getElementById('header-sub').textContent = m==='cpu' ? 'vs Computer' : 'Pass & Play';
  scores = {X:0,O:0,D:0}; updateScores(); init();
}

function renderBoard() {
  document.querySelectorAll('.cell').forEach((c,i)=>{
    c.textContent = board[i]||'';
    c.className = 'cell'+(board[i]?' taken '+board[i].toLowerCase():'');
  });
}

function setStatus() {
  const el = document.getElementById('status');
  if (mode==='cpu') el.textContent = cur==='X' ? 'Your turn (X)' : 'Computer thinking…';
  else el.textContent = `Player ${cur==='X'?1:2}'s turn (${cur})`;
}

function getWinner(b) {
  for (let [a,c,d] of WINS) if (b[a]&&b[a]===b[c]&&b[a]===b[d]) return {winner:b[a],line:[a,c,d]};
  if (b.every(v=>v)) return {winner:'D'};
  return null;
}

function updateScores() {
  document.getElementById('score-x').textContent = scores.X;
  document.getElementById('score-o').textContent = scores.O;
  document.getElementById('score-d').textContent = scores.D;
}

function showOverlay(winner) {
  const emojis={X:'🏆',O: mode==='cpu'?'🤖':'🥇',D:'🤝'};
  const titles={X:mode==='cpu'?'You win!':'Player 1 wins!',O:mode==='cpu'?'Computer wins!':'Player 2 wins!',D:"It's a draw!"};
  const subs={X:mode==='cpu'?'Nicely done!':'Well played!',O:mode==='cpu'?'The AI got you!':'Solid moves!',D:'Too evenly matched!'};
  document.getElementById('r-emoji').textContent = emojis[winner];
  document.getElementById('r-title').textContent = titles[winner];
  document.getElementById('r-sub').textContent = subs[winner];
  setTimeout(()=>document.getElementById('overlay').classList.add('show'),400);
}

function click_(i) {
  if (locked||board[i]||(mode==='cpu'&&cur==='O')) return;
  place(i, cur);
}

function place(i, player) {
  board[i] = player;
  const c = document.querySelector(`[data-i="${i}"]`);
  c.textContent = player;
  c.className = `cell taken ${player.toLowerCase()} pop`;
  const res = getWinner(board);
  if (res) {
    if (res.line) res.line.forEach(idx=>{
      const el = document.querySelector(`[data-i="${idx}"]`);
      el.classList.add('win');
      if (player==='O') el.classList.add('o');
    });
    scores[res.winner]++; updateScores(); locked=true; showOverlay(res.winner); return;
  }
  cur = cur==='X'?'O':'X'; setStatus();
  if (mode==='cpu'&&cur==='O') { locked=true; setTimeout(cpuMove,600); }
}

function cpuMove() {
  locked=false; place(minimax(board,'O').idx,'O');
}

function minimax(b,player,depth=0) {
  const res=getWinner(b);
  if (res) { if(res.winner==='O') return {score:10-depth}; if(res.winner==='X') return {score:depth-10}; return {score:0}; }
  const moves=[];
  b.forEach((v,i)=>{ if(!v){const nb=[...b];nb[i]=player;const s=minimax(nb,player==='O'?'X':'O',depth+1).score;moves.push({idx:i,score:s});}});
  return player==='O' ? moves.reduce((a,m)=>m.score>a.score?m:a) : moves.reduce((a,m)=>m.score<a.score?m:a);
}

function newGame() { init(); }
function resetAll() { scores={X:0,O:0,D:0}; updateScores(); init(); }

init();
</script>
</body>
</html>
